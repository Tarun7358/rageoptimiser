version: '3.8'

services:
  bot:
    build: .
    ports:
      - "5000:5000"
      - "5001:5001"
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - CLIENT_ID=${CLIENT_ID}
      - GUILD_ID=${GUILD_ID}
      - PORT=5000
      - WS_PORT=5001
      - MONGO_URI=mongodb://mongo:27017/clutchnation
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - mongo
    restart: unless-stopped

  mongo:
    image: mongo:6.0
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data:
